name: Release

# Triggered when you push a version tag (v*).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PNPM_VERSION: "10"
  NODE_VERSION: "20"

jobs:
  # ─── 1. Create a draft release ──────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          name: Arkestrator ${{ github.ref_name }}

  # ─── 2. Build Tauri desktop client (per platform) ───────────────────
  build-client:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            # Skip AppImage: linuxdeploy's eu-strip crashes on modern .relr.dyn
            # ELF sections (tauri-apps/tauri#14796). Ship deb + rpm for now.
            # Re-enable when tauri-apps/tauri#12491 (new AppImage bundler) ships.
            args: "--bundles deb,rpm"
          - platform: macos-14             # arm64 (Apple Silicon) — pinned: macos-latest (15/Sequoia) breaks hdiutil DMG creation
            args: ""
          - platform: windows-latest      # x64
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4.2.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      # Linux needs WebKit + GTK dev libs for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: pnpm install

      # Build protocol + compile server into sidecar binary
      - name: Build sidecar
        run: pnpm build:sidecar

      # Build admin SPA and copy into Tauri resources
      - name: Build admin SPA
        run: pnpm --filter @arkestrator/admin build

      - name: Copy admin dist to Tauri resources
        shell: bash
        run: |
          mkdir -p client/src-tauri/resources/admin-dist
          cp -r admin/dist/* client/src-tauri/resources/admin-dist/

      # Build Tauri app and upload installers to the draft release
      # tauri-action@v0 is the current stable major — supports Tauri v2.
      # No v1 tag exists yet; revisit when upstream cuts one.
      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (generate with: pnpm tauri signer generate -w ~/.tauri/arkestrator.key)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing (empty values are harmless on other platforms)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: pnpm tauri
          projectPath: client
          args: ${{ matrix.args }}

  # ─── 3. Build standalone server binaries ────────────────────────────
  #  For users who want to run the server without Docker or Tauri.
  build-server:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x64
            ext: ""
          - os: macos-latest
            name: darwin-arm64
            ext: ""
          - os: windows-latest
            name: win-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4.2.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build protocol
        run: pnpm --filter @arkestrator/protocol build

      - name: Build admin SPA
        run: pnpm --filter @arkestrator/admin build

      - name: Compile standalone server binary
        shell: bash
        run: |
          cd server
          bun build --compile src/index.ts \
            --outfile "../arkestrator-server-${{ matrix.name }}${{ matrix.ext }}"

      - name: Upload server binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: arkestrator-server-${{ matrix.name }}${{ matrix.ext }}

  # ─── 4. Publish the release (remove draft status) ──────────────────
  publish-release:
    needs: [create-release, build-client, build-server]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });

  # ─── 5. Update Linux package repositories (APT + RPM on gh-pages) ──
  update-repos:
    needs: [create-release, publish-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to gh-pages branch
        run: |
          if git rev-parse --verify origin/gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

      - name: Install repo tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev createrepo-c rpm

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> "$GITHUB_ENV"

      - name: Export public GPG key
        run: |
          gpg --armor --export "$GPG_KEY_ID" > gpg-key.asc

      - name: Copy install files from main branch
        run: |
          git fetch origin main
          git checkout origin/main -- install/install.sh install/arkestrator.repo
          cp install/install.sh install.sh
          cp install/arkestrator.repo arkestrator.repo
          chmod +x install.sh
          rm -rf install

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          mkdir -p /tmp/assets
          gh release download "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --pattern "*.deb" \
            --dir /tmp/assets || true
          gh release download "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --pattern "*.rpm" \
            --dir /tmp/assets || true

          echo "Downloaded assets:"
          ls -la /tmp/assets/

      - name: Sign RPM packages
        run: |
          # Configure RPM macros for GPG signing
          cat > ~/.rpmmacros <<EOF
          %_gpg_name $GPG_KEY_ID
          %_gpg_sign_cmd_extra_args --batch --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}"
          %__gpg_sign_cmd %{__gpg} gpg --batch --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --no-verbose --no-armor %{?_gpg_digest_algo:--digest-algo %{_gpg_digest_algo}} --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} --digest-algo sha256 %{__plaintext_filename}
          EOF
          sed -i 's/^          //' ~/.rpmmacros

          # Import public key into RPM keyring so rpm -K can verify
          gpg --armor --export "$GPG_KEY_ID" > /tmp/gpg-pub.asc
          sudo rpm --import /tmp/gpg-pub.asc

          for rpm_file in /tmp/assets/*.rpm; do
            if [ -f "$rpm_file" ]; then
              echo "Signing $rpm_file..."
              rpm --addsign "$rpm_file"
              echo "Verifying signature..."
              rpm -K --nosignature "$rpm_file"
            fi
          done

      # ─── APT repository ──────────────────────────────────────────────
      - name: Build APT repo
        run: |
          mkdir -p apt/pool apt/dists/stable/main/binary-amd64

          # Copy new .deb files (keep old versions for history)
          cp /tmp/assets/*.deb apt/pool/ 2>/dev/null || echo "No .deb files found"

          # Generate Packages index
          cd apt
          dpkg-scanpackages --multiversion pool > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz

          # Generate Release file
          cd dists/stable
          cat > Release <<'EOF'
          Origin: Arkestrator
          Label: Arkestrator
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Arkestrator package repository
          EOF
          sed -i 's/^          //' Release

          # Add checksums
          {
            echo "SHA256:"
            for f in main/binary-amd64/Packages main/binary-amd64/Packages.gz; do
              if [ -f "$f" ]; then
                SIZE=$(wc -c < "$f")
                HASH=$(sha256sum "$f" | cut -d' ' -f1)
                printf " %s %s %s\n" "$HASH" "$SIZE" "$f"
              fi
            done
          } >> Release

          cd "$GITHUB_WORKSPACE"

      - name: Sign APT repo
        run: |
          cd apt/dists/stable
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --default-key "$GPG_KEY_ID" \
            -abs -o Release.gpg Release
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --default-key "$GPG_KEY_ID" \
            --clearsign -o InRelease Release

      # ─── RPM repository ──────────────────────────────────────────────
      - name: Build RPM repo
        run: |
          mkdir -p rpm/packages

          # Copy new .rpm files
          cp /tmp/assets/*.rpm rpm/packages/ 2>/dev/null || echo "No .rpm files found"

          # Generate repodata
          createrepo_c rpm

      - name: Sign RPM repo
        run: |
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --default-key "$GPG_KEY_ID" \
            -abs -o rpm/repodata/repomd.xml.asc rpm/repodata/repomd.xml

      # ─── Publish ──────────────────────────────────────────────────────
      - name: Generate index page
        run: |
          cat > index.html <<'HEREDOC'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Arkestrator Linux Packages</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #e0e0e0; background: #1a1a2e; }
              h1 { color: #e94560; }
              h2 { color: #e94560; border-bottom: 2px solid #16213e; padding-bottom: .3rem; }
              code, pre { background: #16213e; padding: .2em .4em; border-radius: 4px; font-size: .9em; }
              pre { padding: 1em; overflow-x: auto; }
              a { color: #e94560; }
            </style>
          </head>
          <body>
            <h1>Arkestrator Linux Packages</h1>
            <p>Install Arkestrator on your Linux system using your package manager.</p>

            <h2>Quick Install (auto-detects distro)</h2>
            <pre>curl -fsSL https://timvanhelsdingen.github.io/arkestrator/install.sh | sudo bash</pre>

            <h2>Fedora / RHEL / CentOS (dnf/yum)</h2>
            <pre>sudo dnf config-manager addrepo --from-repofile=https://timvanhelsdingen.github.io/arkestrator/arkestrator.repo
          sudo dnf install arkestrator</pre>

            <h2>Debian / Ubuntu (apt)</h2>
            <pre>curl -fsSL https://timvanhelsdingen.github.io/arkestrator/gpg-key.asc | sudo gpg --dearmor -o /usr/share/keyrings/arkestrator.gpg
          echo "deb [signed-by=/usr/share/keyrings/arkestrator.gpg] https://timvanhelsdingen.github.io/arkestrator/apt stable main" | sudo tee /etc/apt/sources.list.d/arkestrator.list
          sudo apt update && sudo apt install arkestrator</pre>

            <h2>Arch Linux (AUR)</h2>
            <pre>yay -S arkestrator-bin</pre>
            <p>Or manually: <code>git clone https://aur.archlinux.org/arkestrator-bin.git && cd arkestrator-bin && makepkg -si</code></p>
          </body>
          </html>
          HEREDOC
          sed -i 's/^          //' index.html

      - name: Commit and push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update repos for v${{ needs.create-release.outputs.version }}"
          git push origin gh-pages
