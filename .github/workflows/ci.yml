name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4.2.0
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build protocol package
        run: pnpm --filter @arkestrator/protocol build

      # Type checks (server tsc skipped — pre-existing strict-mode issues)
      - name: Type-check client
        run: cd client && npx svelte-check --tsconfig ./tsconfig.json

      - name: Type-check admin
        run: cd admin && npx svelte-check --tsconfig ./tsconfig.json

      # Tests
      - name: Run server tests
        run: pnpm --filter @arkestrator/server test

      - name: Run protocol tests
        run: pnpm --filter @arkestrator/protocol test
