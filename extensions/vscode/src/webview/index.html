<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkestrator Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--vscode-font-family, sans-serif);
      font-size: var(--vscode-font-size, 13px);
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--vscode-panel-border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h2 { font-size: 14px; font-weight: 600; flex: 1; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--vscode-testing-iconFailed);
    }
    .status-dot.connected { background: var(--vscode-testing-iconPassed); }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 85%;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.5;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--vscode-editor-inactiveSelectionBackground, rgba(255,255,255,0.05));
    }
    .msg.error {
      align-self: center;
      color: var(--vscode-errorForeground);
      font-size: 12px;
    }
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--vscode-panel-border);
      display: flex;
      gap: 8px;
    }
    .input-area textarea {
      flex: 1;
      resize: none;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 4px;
      padding: 8px;
      font-family: inherit;
      font-size: inherit;
      min-height: 36px;
      max-height: 120px;
    }
    .input-area textarea:focus { outline: 1px solid var(--vscode-focusBorder); }
    .input-area button {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 500;
    }
    .input-area button:hover { background: var(--vscode-button-hoverBackground); }
    .input-area button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h2>Arkestrator Chat</h2>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="send()">Send</button>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusDot = document.getElementById('statusDot');

    let history = [];
    let currentAssistantEl = null;
    let streaming = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text || streaming) return;

      addMessage('user', text);
      history.push({ role: 'user', content: text });

      inputEl.value = '';
      inputEl.style.height = 'auto';

      vscode.postMessage({ type: 'chat', prompt: text, history });
    }

    function addMessage(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    window.addEventListener('message', (e) => {
      const msg = e.data;
      switch (msg.type) {
        case 'start':
          streaming = true;
          sendBtn.disabled = true;
          currentAssistantEl = addMessage('assistant', '');
          break;
        case 'chunk':
          if (currentAssistantEl) {
            currentAssistantEl.textContent += msg.text;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          }
          break;
        case 'done':
          if (currentAssistantEl) {
            history.push({ role: 'assistant', content: currentAssistantEl.textContent });
          }
          currentAssistantEl = null;
          streaming = false;
          sendBtn.disabled = false;
          break;
        case 'error':
          addMessage('error', msg.text);
          currentAssistantEl = null;
          streaming = false;
          sendBtn.disabled = false;
          break;
        case 'status':
          statusDot.className = 'status-dot' + (msg.connected ? ' connected' : '');
          break;
      }
    });

    // Check connection on load
    vscode.postMessage({ type: 'getStatus' });
  </script>
</body>
</html>
